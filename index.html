<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: 'rgba(var(--color-primary), <alpha-value>)',
            'primary-dark': 'rgba(var(--color-primary-dark), <alpha-value>)',
            bg: 'rgba(var(--color-bg), <alpha-value>)',
            'bg-alt': 'rgba(var(--color-bg-alt), <alpha-value>)',
            surface: 'rgba(var(--color-surface), <alpha-value>)',
            'text-main': 'rgba(var(--color-text), <alpha-value>)',
            'text-muted': 'rgba(var(--color-text-muted), <alpha-value>)',
          },
          fontFamily: {
            sans: ['Montserrat', 'sans-serif'],
            poppins: ['Poppins', 'sans-serif'],
            montserrat: ['Montserrat', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <title>weixies-webshop</title>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
